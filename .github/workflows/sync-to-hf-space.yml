name: Sync to Hugging Face Space

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face Hub SDK
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Upload repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is missing. Please add it in GitHub Secrets."
            exit 1
          fi

          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id="bigflyanpu/coal_price_prediction",
              repo_type="space",
              folder_path=".",
              commit_message="Sync from GitHub Actions",
              ignore_patterns=[
                  ".git/*",
                  ".venv/*",
                  "__pycache__/*",
                  "*.pyc",
                  ".pytest_cache/*",
                  "src/*",
                  "templates/*",
                  "static/*",
                  "config/*",
                  "configs/*",
                  "schemas/*",
                  "python/*",
                  "cpp_core/*",
                  "scripts/*",
                  "tests/*",
                  "models/*",
                  "reports/*",
                  "data/*",
                  "requirements.txt",
                  "runtime.txt",
                  "docs/*",
                  "generate_data_gap_audit.py",
                  "generate_paper_tables.py",
              ],
          )
          print("Upload to Hugging Face Space completed.")
          PY
