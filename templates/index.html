<!doctype html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>煤炭价格预测全景驾驶舱 - 南京大学</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Element Plus CSS (Dark Theme) -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/theme-chalk/dark/css-vars.css">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/dashboard.css?v=5">
  
  <!-- Vue 3 & Element Plus JS -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app" class="app-container" v-cloak>
    
    <!-- Loading State -->
    <div v-if="loading" class="loading-screen">
      <div class="loader">
        <div class="scanner">
          <span>Loading Financial Models...</span>
        </div>
      </div>
    </div>

    <template v-else>
      <!-- Header -->
      <header class="sys-header">
        <div class="header-left">
          <div class="logo-glow"></div>
          <h1>多尺度大宗商品价格预测系统 <span>v3.0 Pro</span></h1>
        </div>
        <div class="header-right">
          <div class="status-badge">
            <span class="pulse-dot"></span> 双轨定价监控中
          </div>
          <div class="sys-time">{{ currentTime }}</div>
        </div>
      </header>

      <main class="main-content">
        <!-- Module 1: Global Command Center -->
        <div class="module-title">全景驾驶舱 (Global Command Center)</div>
        
        <!-- Top KPI Cards -->
        <el-row :gutter="20" class="kpi-row">
          <el-col :span="6" v-for="(kpi, idx) in topKpis" :key="idx">
            <el-card class="kpi-card" shadow="hover" :class="{ 'warning-glow': kpi.warning }">
              <div class="kpi-header">
                <span class="kpi-title">{{ kpi.title }}</span>
                <el-tag :type="kpi.tagType" size="small" effect="dark">{{ kpi.tag }}</el-tag>
              </div>
              <div class="kpi-value-wrap">
                <span class="kpi-value">{{ formatPrecision(kpi.value) }}</span>
                <span class="kpi-unit">{{ kpi.unit }}</span>
              </div>
              <div class="kpi-trend" :class="kpi.trend > 0 ? 'up' : 'down'">
                <el-icon><Top v-if="kpi.trend > 0" /><Bottom v-else /></el-icon>
                {{ Math.abs(kpi.trend).toFixed(3) }}% 较昨日
              </div>
            </el-card>
          </el-col>
        </el-row>

        <!-- Main Chart & Gauges -->
        <el-row :gutter="20" class="chart-row">
          <el-col :span="16">
            <el-card class="chart-card" shadow="never">
              <template #header>
                <div class="card-header">
                  <span>双轨价差动态监控与异构事件打桩 (Dual-track & Event Overlay)</span>
                  <el-tooltip content="红色高亮区域代表市场价偏离长协价超出政策合理区间" placement="top">
                    <el-icon class="info-icon"><InfoFilled /></el-icon>
                  </el-tooltip>
                </div>
              </template>
              <div id="mainDualTrackChart" class="echarts-container" style="height: 380px;"></div>
            </el-card>
          </el-col>
          <el-col :span="8">
            <el-card class="chart-card" shadow="never">
              <template #header>
                <div class="card-header">
                  <span>模型性能看板 (Model Performance)</span>
                </div>
              </template>
              <div id="gaugeChart" class="echarts-container" style="height: 380px;"></div>
            </el-card>
          </el-col>
        </el-row>

        <!-- Module 2: Multi-scale Prediction Board -->
        <div class="module-title mt-6">多尺度自适应预测引擎 (Multi-scale Prediction Board)</div>
        <el-card class="tabs-card" shadow="never">
          <el-tabs v-model="activeTab" @tab-change="handleTabChange">
            <el-tab-pane label="日度 (高频市场监控)" name="daily">
              <el-row :gutter="20">
                <el-col :span="18">
                  <div id="dailyChart" class="echarts-container" style="height: 300px;"></div>
                </el-col>
                <el-col :span="6">
                  <div class="tech-panel">
                    <h4>LSTM-Transformer 引擎状态</h4>
                    <div class="tech-item"><span>RMSE:</span> <span class="tech-val">{{ formatPrecision(backtestSummary?.daily_market?.rmse) }}</span></div>
                    <div class="tech-item"><span>MAE:</span> <span class="tech-val">{{ formatPrecision(backtestSummary?.daily_market?.mae) }}</span></div>
                    <div class="tech-item"><span>预测次日现货:</span> <span class="tech-val highlight">{{ formatPrecision(prediction.next_day_market_price) }}</span></div>
                    <div class="tech-item"><span>预测次日长协:</span> <span class="tech-val highlight">{{ formatPrecision(prediction.next_day_contract_price) }}</span></div>
                  </div>
                </el-col>
              </el-row>
            </el-tab-pane>
            
            <el-tab-pane label="月度 (中长周期供需)" name="monthly">
              <el-row :gutter="20">
                <el-col :span="16">
                  <div id="featureImportanceChart" class="echarts-container" style="height: 300px;"></div>
                </el-col>
                <el-col :span="8">
                  <div class="tech-panel">
                    <h4>LightGBM 核心驱动因子</h4>
                    <p class="tech-desc">展示对月度价格波动贡献最大的前 10 项结构化与非结构化特征。季节性波动与港口库存权重显著。</p>
                    <div class="tech-item mt-4"><span>预测次月均价:</span> <span class="tech-val highlight">{{ formatPrecision(prediction.next_month_market_price) }}</span></div>
                  </div>
                </el-col>
              </el-row>
            </el-tab-pane>
            
            <el-tab-pane label="年度 (宏观与政策导向)" name="yearly">
              <el-row :gutter="20">
                <el-col :span="16">
                  <div id="yearlySimulationChart" class="echarts-container" style="height: 300px;"></div>
                </el-col>
                <el-col :span="8">
                  <div class="tech-panel">
                    <h4>Robust-SVR 政策沙盘推演</h4>
                    <p class="tech-desc">拖动下方滑块，模拟政策调控力度增加或减弱时，未来年度价格中枢的动态响应。</p>
                    <div class="slider-wrap mt-4">
                      <span class="slider-label">政策调控力度模拟 (Δ%)</span>
                      <el-slider v-model="policySimulation" :min="-50" :max="50" :step="5" show-input @change="updateYearlySimulation"></el-slider>
                    </div>
                    <div class="tech-item mt-4"><span>推演年度均价:</span> <span class="tech-val highlight">{{ formatPrecision(simulatedYearlyPrice) }}</span></div>
                  </div>
                </el-col>
              </el-row>
            </el-tab-pane>
          </el-tabs>
        </el-card>

        <!-- Module 3: Heterogeneous Data Explorer -->
        <div class="module-title mt-6">多源异构预测因子分析图谱 (Heterogeneous Data Explorer)</div>
        <el-row :gutter="20" class="mb-6">
          <el-col :span="12">
            <el-card class="chart-card" shadow="never">
              <template #header><div class="card-header"><span>政策导向与强度雷达图 (Policy Dimensions)</span></div></template>
              <div id="radarChart" class="echarts-container" style="height: 320px;"></div>
            </el-card>
          </el-col>
          <el-col :span="12">
            <el-card class="chart-card" shadow="never">
              <template #header><div class="card-header"><span>全网舆情情感热力趋势 (Sentiment Heatmap)</span></div></template>
              <div id="sentimentChart" class="echarts-container" style="height: 320px;"></div>
            </el-card>
          </el-col>
        </el-row>

      </main>
    </template>
  </div>

  <script src="/static/js/dashboard.js?v=5"></script>
</body>
</html>
