services:
  - type: web
    name: coal-price-prediction
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python python/cli/run_train.py
    startCommand: gunicorn python.serving.app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
