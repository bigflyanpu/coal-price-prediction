services:
  - type: web
    name: coal-price-prediction
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r core/requirements.txt
    startCommand: cd core && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FAST_MODE
        value: "1"
      - key: LIVE_TEXT_SOURCES
        value: "0"
      - key: REFRESH_CACHE
        value: "1"
      - key: STRICT_REAL_DATA
        value: "1"
      - key: COAL_CPP_CORE
        value: "0"
