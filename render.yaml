services:
  - type: web
    name: coal-price-prediction
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r core/requirements.txt && cd core && python train.py
    startCommand: cd core && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
